services:
  - type: web
    name: hebrewc
    runtime: node
    plan: starter
    buildCommand: cd frontend && npm install --include=dev && npm run build && cd ../backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: JWT_SECRET
        generateValue: true
    disk:
      name: hebrewc-data
      mountPath: /var/data
      sizeGB: 1
